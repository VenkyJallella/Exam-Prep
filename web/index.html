<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ExamPrep - AI-powered competitive exam preparation platform for UPSC, JEE, SSC, Banking, NEET, GATE, CAT. Practice with adaptive AI questions, mock tests, daily quizzes, and coding challenges." />
    <meta name="keywords" content="exam preparation, UPSC, JEE, SSC, Banking, NEET, GATE, CAT, mock test, AI questions, competitive exam, India, online test, practice questions" />
    <meta name="author" content="ExamPrep" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#4f46e5" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ExamPrep" />
    <meta property="og:title" content="ExamPrep - AI-Powered Competitive Exam Preparation" />
    <meta property="og:description" content="Prepare for UPSC, JEE, SSC, Banking, NEET, GATE exams with AI-generated questions, adaptive learning, mock tests, and performance analytics." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://examprep.in" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ExamPrep - AI-Powered Exam Preparation" />
    <meta name="twitter:description" content="Crack UPSC, JEE, SSC, Banking exams with AI-powered practice. Free to start." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://examprep.in" />

    <title>ExamPrep - AI-Powered Competitive Exam Preparation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ExamPrep",
      "url": "https://examprep.in",
      "logo": "https://examprep.in/favicon.svg",
      "description": "AI-powered competitive exam preparation platform for Indian students",
      "foundingDate": "2024",
      "founder": {
        "@type": "Organization",
        "name": "ExamPrep"
      },
      "sameAs": []
    }
    </script>

    <!-- Structured Data: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ExamPrep",
      "url": "https://examprep.in",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://examprep.in/blog?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: EducationalOrganization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "ExamPrep",
      "url": "https://examprep.in",
      "description": "Online platform for competitive exam preparation in India",
      "areaServed": {
        "@type": "Country",
        "name": "India"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Exam Preparation Courses",
        "itemListElement": [
          {"@type": "Course", "name": "UPSC Civil Services", "description": "Complete UPSC preparation with AI-powered questions"},
          {"@type": "Course", "name": "JEE Main & Advanced", "description": "JEE preparation with adaptive difficulty"},
          {"@type": "Course", "name": "SSC CGL", "description": "SSC CGL exam preparation"},
          {"@type": "Course", "name": "Banking (IBPS/SBI)", "description": "Banking exam preparation with sectional tests"},
          {"@type": "Course", "name": "NEET", "description": "Medical entrance exam preparation"},
          {"@type": "Course", "name": "GATE CS", "description": "GATE Computer Science preparation"},
          {"@type": "Course", "name": "CAT", "description": "MBA entrance exam preparation"}
        ]
      }
    }
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
