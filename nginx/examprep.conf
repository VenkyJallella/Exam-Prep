server {
    listen 80;
    server_name zencodio.com www.zencodio.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zencodio.com www.zencodio.com;

    # SSL (Certbot will fill these)
    ssl_certificate /etc/letsencrypt/live/zencodio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zencodio.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Frontend (React SPA)
    root /var/www/examprep;
    index index.html;

    # Detect search engine bots
    set $prerender 0;
    if ($http_user_agent ~* "googlebot|bingbot|yandex|baiduspider|twitterbot|facebookexternalhit|linkedinbot|whatsapp|Applebot|DuckDuckBot|Slackbot|TelegramBot") {
        set $prerender 1;
    }
    # Don't prerender static files
    if ($uri ~* "\.(js|css|xml|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webp|json|txt)$") {
        set $prerender 0;
    }
    # Don't prerender API calls
    if ($uri ~* "^/(api|health|ws)/") {
        set $prerender 0;
    }

    # SSR endpoint for bots — serves real HTML from database
    location @ssr {
        proxy_pass http://127.0.0.1:8080/api/v1/ssr?url=$scheme://$host$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # If bot, use error_page trick to redirect to @ssr
        if ($prerender = 1) {
            return 450;
        }
        error_page 450 = @ssr;

        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8080;
    }

    # Dynamic sitemap
    location /sitemap.xml {
        proxy_pass http://127.0.0.1:8080;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    client_max_body_size 10M;
}
